$kind: http-request
name: 'Delete Sensor'
method: DELETE
url: '{{rest_base_url}}/sensors/{{sensor_id}}'
order: 5000
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test("Status is 204 No Content", function () {
        pm.response.to.have.status(204);
      });

      pm.test("Response body is empty", function () {
        pm.expect(pm.response.text()).to.be.empty;
      });

      // Clear the sensor_id after deletion
      pm.environment.unset("sensor_id");
      console.log("Sensor deleted and sensor_id cleared.");
