$kind: http-request
name: 'Update Sensor'
method: PUT
url: '{{rest_base_url}}/sensors/{{sensor_id}}'
order: 4000
headers:
  - key: Content-Type
    value: application/json
body:
  type: json
  content: |-
    {
      "name": "Turbine-A3-Temp-Updated",
      "sensor_type": "temperature",
      "location": "Batiment C - Salle 15",
      "unit": "C",
      "status": "maintenance"
    }
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test("Status is 200 OK", function () {
        pm.response.to.have.status(200);
      });

      pm.test("Sensor name was updated", function () {
        var json = pm.response.json();
        pm.expect(json.sensor.name).to.eql("Turbine-A3-Temp-Updated");
      });

      pm.test("Sensor location was updated", function () {
        var json = pm.response.json();
        pm.expect(json.sensor.location).to.eql("Batiment C - Salle 15");
      });

      pm.test("Sensor status was updated", function () {
        var json = pm.response.json();
        pm.expect(json.sensor.status).to.eql("maintenance");
      });
