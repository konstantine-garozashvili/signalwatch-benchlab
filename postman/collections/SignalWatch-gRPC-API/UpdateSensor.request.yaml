$kind: grpc-request
name: UpdateSensor
url: '{{grpc_host}}'
methodPath: '/signalwatch.sensor.v1.SensorService/UpdateSensor'
methodDescriptor: ''
order: 4000
message:
  content: |-
    {
      "id": "{{sensor_id}}",
      "name": "Turbine-A3-Temp-Updated",
      "sensorType": "SENSOR_TYPE_TEMPERATURE",
      "location": "Batiment C - Salle 15",
      "unit": "C",
      "status": "SENSOR_STATUS_MAINTENANCE"
    }
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test("gRPC status is OK", function () {
        pm.response.to.have.statusCode(0);
      });

      pm.test("Sensor was updated", function () {
        var msg = pm.response.messages.all()[0];
        pm.expect(msg.sensor.name).to.eql("Turbine-A3-Temp-Updated");
      });
