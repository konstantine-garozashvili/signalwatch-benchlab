$kind: collection
name: 'SignalWatch gRPC API'
description: |-
  gRPC CRUD operations for the SignalWatch SensorService built with Tonic (Rust).
  Connect to {{grpc_host}} (default: 127.0.0.1:50051).

  Run RPCs in order to test the full sensor lifecycle:
  1. CreateSensor  → saves {{sensor_id}}
  2. ListSensors
  3. GetSensor
  4. UpdateSensor
  5. DeleteSensor
