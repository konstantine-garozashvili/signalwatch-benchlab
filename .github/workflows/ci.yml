# Pipeline d'integration continue (CI) - SignalWatch BenchLab
# Declenche sur chaque push et Pull Request vers main et develop

name: CI Rust

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # -------------------------------------------------------
  # Verification du formatage
  # -------------------------------------------------------
  formatage:
    name: Formatage (cargo fmt)
    runs-on: ubuntu-latest
    steps:
      - name: Recuperer le code source
        uses: actions/checkout@v4

      - name: Installer Rust stable avec rustfmt
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Verifier le formatage
        run: cargo fmt --all -- --check

  # -------------------------------------------------------
  # Analyse statique (linting)
  # -------------------------------------------------------
  linting:
    name: Linting (cargo clippy)
    runs-on: ubuntu-latest
    steps:
      - name: Recuperer le code source
        uses: actions/checkout@v4

      - name: Installer Rust stable avec clippy
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Lancer clippy (zero avertissement tolere)
        run: cargo clippy --all-targets --all-features -- -D warnings

  # -------------------------------------------------------
  # Tests unitaires et d'integration
  # -------------------------------------------------------
  tests:
    name: Tests (cargo test)
    runs-on: ubuntu-latest
    steps:
      - name: Recuperer le code source
        uses: actions/checkout@v4

      - name: Installer Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Lancer les tests
        run: cargo test --all --verbose

  # -------------------------------------------------------
  # Build en mode release
  # -------------------------------------------------------
  build:
    name: Build release
    runs-on: ubuntu-latest
    needs: [formatage, linting, tests]
    steps:
      - name: Recuperer le code source
        uses: actions/checkout@v4

      - name: Installer Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-cargo-release-${{ hashFiles('**/Cargo.lock') }}

      - name: Compiler en mode release
        run: cargo build --release --all

  # -------------------------------------------------------
  # Audit de securite des dependances
  # -------------------------------------------------------
  audit-securite:
    name: Audit de securite (cargo audit)
    runs-on: ubuntu-latest
    steps:
      - name: Recuperer le code source
        uses: actions/checkout@v4

      - name: Installer cargo-audit
        run: cargo install cargo-audit --locked

      - name: Lancer l'audit de securite
        run: cargo audit
